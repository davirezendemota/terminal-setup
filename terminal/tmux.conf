# Config lives in ~/Documents/terminal-setup/terminal/tmux.conf

set -g default-terminal "tmux-256color"
# Idempotent (source-file safe): one assignment, not -ag append
set -as terminal-overrides ",xterm-256color:RGB,tmux-256color:RGB"
set -as terminal-features "xterm*:RGB,tmux*:RGB,iTerm*:RGB"
set -ag update-environment "COLORTERM"
set -ag update-environment "TERMINAL_SETUP_DIR"
setw -g allow-passthrough on

set -g prefix C-s
unbind C-a
unbind C-b
bind C-s send-prefix

# Ctrl+n — próxima aba (sem prefix)
unbind -n C-b
bind -n C-n next-window

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0
set -g renumber-windows on
set -g allow-rename on
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{m/ssh,pane_current_command},#{pane_title},#{s|.*/||:pane_current_path}}'

# Catppuccin — requires Nerd Font in iTerm2 (Profiles → Text → Font)
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
run-shell 'test -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux || echo "Catppuccin missing: run python3 install.py from terminal-setup"'
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-left ""
set -g status-left-length 100
set -g status-right "#{E:@catppuccin_status_session}"
set -g status-right-length 100
set -g status-position top

bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind n new-window -c "#{pane_current_path}"
bind S new-session -c "#{pane_current_path}"
unbind g
unbind d
unbind w
bind w confirm-before -p "kill-pane? (y/n)" kill-pane
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
unbind q
bind q confirm-before -p "Apagar sessão #{session_name}? (y/n)" 'run-shell "$TERMINAL_SETUP_DIR/terminal/bin/tmux-kill-session"'

# Ctrl+d — detach (sem prefix)
unbind -n C-q
unbind -n C-Q
bind -n C-d detach-client

bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind |
unbind -
unbind '"'
unbind %

bind k select-pane -U
bind l select-pane -R
unbind j

# vim-tmux-navigator — seamless Ctrl+h/j/k/l between nvim splits and tmux panes
# https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind -n M-Left swap-pane -D
bind -n M-Right swap-pane -U
