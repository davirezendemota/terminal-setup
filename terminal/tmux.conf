# Config lives in ~/Documents/terminal-config/tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0
set -g renumber-windows on

set -g status-position top
set -g status-style "fg=colour245,bg=colour235"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g message-style "fg=colour235,bg=colour39"

setw -g window-status-current-style "fg=colour39,bg=colour235,bold"
setw -g window-status-style "fg=colour245,bg=colour235"

bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-Left swap-pane -D
bind -n M-Right swap-pane -U
